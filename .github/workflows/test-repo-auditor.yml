name: Test Repository Auditor
on:
  pull_request:
    paths:
      - 'edfi-repo-auditor/**'
  push:
    paths:
      - 'edfi-repo-auditor/**'
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    name: Run unit, style, and type checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: edfi-repo-auditor
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Poetry
        run: pipx install poetry

      - name: Install Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "poetry"

      - name: Install dependencies
        run: poetry env use "3.12" && poetry install

      - name: Lint
        run: poetry run flake8

      - name: Type Check
        if: always()
        run: poetry run mypy . --junit-xml mypy-junit.xml

      - name: Unit Tests
        if: always()
        run: poetry run pytest --junitxml=pytest-junit.xml
