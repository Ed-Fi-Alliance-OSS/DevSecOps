name: Run Single Audit
run-name: "Audit ${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}"
on:
  workflow_dispatch:
    inputs:
      organization:
        type: choice
        description: Organization
        options:
        - Ed-Fi-Exchange-OSS
        - Ed-Fi-Alliance-OSS
        - Ed-Fi-Closed
        required: true
      repository:
        type: string
        description: Name of repository to analyze
        default: ''
        required: true

env:
  PERSONAL_ACCESS_TOKEN: ${{ secrets.EDFI_BUILD_AGENT_PAT }}

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: read

jobs:
  audit:
    name: Audit organization or repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edfi-repo-auditor

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Poetry
        run: pipx install poetry

      - name: Install Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Determine repository details
        id: repo-info
        run: |
          echo "organization=${{ github.event.inputs.organization }}" >> $GITHUB_OUTPUT
          echo "repository=${{ github.event.inputs.repository }}" >> $GITHUB_OUTPUT
          echo "Auditing repository: ${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}"

      - name: Run the auditor
        run: |
          poetry run python edfi_repo_auditor \
            -p "${{ env.PERSONAL_ACCESS_TOKEN }}" \
            -s -o "${{ github.event.inputs.organization }}" \
            -r "${{ github.event.inputs.repository }}"
